<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Irrigation System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="header-placeholder"></div>

  <main class="content">
    <h1>Welcome to the Smart Irrigation System</h1>

    <p>
      This project is designed to automate plant watering by monitoring soil moisture levels using wireless sensors
      and a custom microcontroller system. It ensures optimal hydration with minimal manual intervention, helping
      save time and water.
    </p>
  </main>

  <script>
    fetch("header.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("header-placeholder").innerHTML = data;
      });

    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.classList.toggle("open");
    }

    function closeMenu() {
      const menu = document.getElementById("menu");
      menu.classList.remove("open");
    }
  </script>

</body>
</html>
