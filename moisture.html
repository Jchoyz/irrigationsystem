<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soil Moisture Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <h1>🌱 Smart Garden Soil Status 🌱</h1>

    <div class="sensor-card">
        <h2>Soil Moisture</h2>
        <div id="soilStatus" class="status">Loading...</div>
    </div>

    <div class="sensor-card">
        <h2>Temperature</h2>
        <div id="tempStatus" class="status">Loading...</div>
    </div>

    <div class="sensor-card">
        <h2>Humidity</h2>
        <div id="humStatus" class="status">Loading...</div>
    </div>
  </main>

  <script>
  fetch("header.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("header-placeholder").innerHTML = data;
    });

  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function closeMenu() {
    document.getElementById("menu").classList.remove("open");
  }

  function fetchSensorData() {
    fetch("sensor_data.json?nocache=" + Date.now())
      .then(response => response.json())
      .then(data => {
        document.getElementById("soilStatus").textContent = data.soil;
        document.getElementById("tempStatus").textContent = data.temperature + " °C";
        document.getElementById("humStatus").textContent = data.humidity + " %";

        if (data.soil == "DRY") {
          document.body.style.backgroundColor = "#ffccbc";
        } else if (data.soil == "WET") {
          document.body.style.backgroundColor = "#b3e5fc";
        } else {
          document.body.style.backgroundColor = "#dcedc8";
        }
      })
      .catch(error => {
        console.error("Error fetching sensor data:", error);
      });
  }

    setInterval(fetchSensorData, 5000);
    window.onload = fetchSensorData;
  </script>
</body>
</html>
